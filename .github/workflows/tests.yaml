name: run_tests
run-name: Flutter tests
on:
  workflow_call:
  workflow_dispatch:
jobs:
  run_tests:
    name: Run flutter tests
    runs-on: macos-26
    steps:
      - name: Clone repo
        uses: actions/checkout@v5
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
      - name: Install dependencies
        run: flutter pub get
      - name: Run tests
        run: flutter test